<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eros — Generative Art Engine</title>
  <meta name="description" content="Eros: A multi-method generative art engine. Ottoman geometry meets abstract art.">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header id="app-header">
  <div class="header-brand">
    <span class="brand-icon">🔥</span>
    <div>
      <h1>Eros</h1>
      <span class="brand-sub">GENERATIVE ART ENGINE</span>
    </div>
  </div>
  <nav id="main-nav">
    <button class="tab-btn" data-tab="canvas-2d">Canvas</button>
    <button class="tab-btn active" data-tab="gallery">Gallery</button>
  </nav>
</header>

<!-- Mobile Bottom Navigation (hidden on desktop, fixed bottom on mobile) -->
<nav id="mobile-nav">
  <button class="mobile-nav-btn active" data-tab="gallery" title="Gallery">
    <span class="mobile-nav-icon">📂</span><span class="mobile-nav-label">Gallery</span>
  </button>
  <button class="mobile-nav-btn" data-tab="canvas-2d" title="Canvas">
    <span class="mobile-nav-icon">🖼️</span><span class="mobile-nav-label">Canvas</span>
  </button>
  <button class="mobile-nav-btn" data-action="sidebar" title="Parameters">
    <span class="mobile-nav-icon">⚙</span><span class="mobile-nav-label">Params</span>
  </button>
  <button class="mobile-nav-btn" data-action="palette" title="Palette">
    <span class="mobile-nav-icon">🎨</span><span class="mobile-nav-label">Palette</span>
  </button>
</nav>

<!-- Mobile Backdrop Overlay -->
<div id="mobile-backdrop"></div>

<!-- ═══════════════════════════════════════════════════ -->
<!-- ── CANVAS TAB ──────────────────────────────────── -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="tab-canvas" class="tab-content">

  <!-- LEFT: Method + Params -->
  <aside id="sidebar">
    <div id="method-selector">
      <h2 class="sidebar-title">Method</h2>
      <div id="method-cards" class="method-cards"></div>
    </div>
    <div class="param-actions">
      <button id="btn-save" class="btn-primary">💾 Save to Gallery</button>
      <div class="btn-row">
        <button id="btn-export" class="btn-secondary">↓ PNG</button>
        <button id="btn-new-seed" class="btn-secondary">🎲 Seed</button>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Animate Section -->
    <div class="anim-section">
      <div id="anim-toggle" class="anim-toggle">
        <span>⏵ Animate</span><span class="anim-chevron">›</span>
      </div>
      <div id="anim-panel" class="anim-panel hidden">

        <div class="anim-ctrl-row">
          <label>Dur <span id="val-anim-dur" class="param-val">8</span>s</label>
          <input type="range" id="anim-duration" min="2" max="60" value="8">
        </div>
        <div class="anim-ctrl-row">
          <label>FPS</label>
          <select id="anim-fps">
            <option value="6">6</option>
            <option value="12" selected>12</option>
            <option value="24">24</option>
          </select>
        </div>
        <div class="anim-ctrl-row">
          <label>Mode</label>
          <select id="anim-mode">
            <option value="forward">A → B</option>
            <option value="backward">B → A</option>
            <option value="pingpong">A → B → A</option>
          </select>
        </div>

        <div class="sidebar-divider" style="margin:6px 0"></div>
        <p class="panel-hint" style="padding:0 2px">Check params · drag amplitude</p>
        <div id="anim-params"></div>

        <div id="anim-progress" class="anim-progress hidden">
          <div id="anim-progress-bar" class="anim-progress-bar"></div>
          <span id="anim-progress-label" class="anim-progress-label">0 / 0</span>
        </div>

        <div class="btn-row" style="margin-top:8px">
          <button id="btn-anim-preview" class="btn-secondary">▶ Preview</button>
          <button id="btn-anim-record"  class="btn-primary">⏺ Record</button>
        </div>

      </div>
    </div>
  </aside>

  <!-- CENTRE: Canvas -->
  <main id="canvas-area">
    <div id="canvas-viewport">
      <canvas id="eros-canvas"></canvas>
    </div>

    <!-- METRICS PANEL — collapsible, below canvas -->
    <div id="metrics-panel" class="metrics-panel collapsed">
      <div id="metrics-header" class="metrics-header">
        <span id="metrics-summary" class="metrics-summary">composing…</span>
        <span id="metrics-score" class="metrics-score"></span>
        <button id="metrics-toggle" class="metrics-toggle-btn" title="Toggle Metrics">▾</button>
      </div>
      <div id="metrics-body" class="metrics-body">
        <div id="metrics-grid" class="metrics-grid"></div>
        <div id="metrics-recommendations" class="metrics-recommendations"></div>
      </div>
    </div>

    <!-- Top-left: Canvas Size Controls -->
    <div id="canvas-size-bar">
      <label>W</label>
      <input type="number" id="canvas-width" value="1024" min="256" max="4096" step="64">
      <span class="size-x">×</span>
      <label>H</label>
      <input type="number" id="canvas-height" value="1024" min="256" max="4096" step="64">
      <button id="btn-canvas-apply" class="btn-icon" title="Apply Size">✓</button>
    </div>

    <!-- Bottom-right: Zoom/Pan + existing buttons -->
    <div id="canvas-toolbar">
      <button id="btn-zoom-in" class="btn-icon" title="Zoom In">＋</button>
      <button id="btn-zoom-out" class="btn-icon" title="Zoom Out">－</button>
      <button id="btn-zoom-fit" class="btn-icon" title="Fit to View">⊡</button>
      <button id="btn-zoom-reset" class="btn-icon" title="Reset Zoom">1:1</button>
      <button id="btn-fullscreen" class="btn-icon">⛶</button>
      <!-- Palette toggle -->
      <button id="btn-palette-toggle" class="btn-icon palette-toggle-btn" title="Toggle Palette Panel">
        <span class="toggle-icon">◧</span>
      </button>
    </div>
  </main>

  <!-- RIGHT: Palette Panel (collapsible) -->
  <aside id="palette-panel" class="palette-panel expanded">

    <!-- Collapse button -->
    <button id="palette-collapse-btn" class="palette-collapse-btn" title="Collapse palette">›</button>

    <div class="palette-panel-inner">
      <h2 class="sidebar-title">Palette</h2>

      <!-- Active palette indicator -->
      <div id="active-palette-bar" class="active-palette-bar">
        <div id="active-palette-swatches" class="active-swatches"></div>
        <span id="active-palette-name" class="active-palette-name">—</span>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Method palettes — click to apply -->
      <h3 class="panel-sub-title">Method Palettes</h3>
      <p class="panel-hint">Click any palette to apply instantly.</p>
      <div id="panel-curated-palettes" class="panel-palette-list"></div>

      <div class="sidebar-divider"></div>

      <!-- Harmony builder -->
      <h3 class="panel-sub-title">Harmony Builder</h3>
      <div class="harmony-mini">
        <div class="harmony-row">
          <label>Mode</label>
          <select id="harmony-mode">
            <option value="analogous">Analogous</option>
            <option value="complementary">Complementary</option>
            <option value="triadic">Triadic</option>
            <option value="split">Split-Comp</option>
            <option value="tetradic">Tetradic</option>
          </select>
        </div>
        <div class="harmony-row">
          <label>H° <span id="val-base-hue" class="param-val">195</span></label>
          <input type="range" id="harmony-hue" min="0" max="360" value="195">
        </div>
        <div class="harmony-row">
          <label>S% <span id="val-base-sat" class="param-val">60</span></label>
          <input type="range" id="harmony-sat" min="0" max="100" value="60">
        </div>
        <div class="harmony-row">
          <label>L% <span id="val-base-lit" class="param-val">45</span></label>
          <input type="range" id="harmony-lit" min="0" max="100" value="45">
        </div>
        <div id="harmony-swatches" class="swatch-row"></div>
        <button id="btn-apply-harmony" class="btn-primary" style="width:100%;margin-top:6px">Apply Harmony</button>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Image extraction -->
      <h3 class="panel-sub-title">Extract from Image</h3>
      <div id="image-drop-zone" class="drop-zone">
        <p>Drop image or click</p>
        <input type="file" id="image-upload" accept="image/*" hidden>
      </div>
      <div id="extracted-swatches" class="swatch-row"></div>
      <button id="btn-apply-extracted" class="btn-secondary" style="width:100%;margin-top:4px;display:none">Apply Extracted</button>
    </div>
  </aside>
</div>



<!-- ═══════════════════════════════════════════════════ -->
<!-- ── GALLERY TAB ─────────────────────────────────── -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="tab-gallery" class="tab-content active" style="position: relative;">
  <div class="gallery-content" style="padding-bottom: 80px;">
    <div id="gallery-grid" class="gallery-grid"></div>
    <p id="gallery-empty" class="gallery-empty">No compositions saved yet.</p>
  </div>
  <!-- Bottom-right: Gallery tools -->
  <div id="gallery-footbar" style="position: absolute; bottom: 20px; right: 20px; display: flex; gap: 8px; z-index: 10;">
    <button id="btn-gallery-import" class="btn-icon" title="Import from .json">↑ JSON</button>
    <button id="btn-gallery-export-all" class="btn-icon" title="Export All">↓ JSON</button>
    <input type="file" id="input-gallery-import" accept=".json" style="display:none">
  </div>
</div>

<!-- Scripts: core → method → UI -->
<script src="eros-core.js"></script>
<script src="methods/edifice.js"></script>

<script src="eros.js"></script>
</body>
</html>
